<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NodeExporter Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="data_export.js"></script>
    <style>
        body { background-color: #121212; color: #eeeeee; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        #ui-bar { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; display: flex; align-items: center; gap: 12px; padding: 14px 24px;
            background: rgba(22, 22, 22, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }

        .btn-glass { 
            background: rgba(255, 255, 255, 0.05); color: #cfcfcf; border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px;
            display: flex; align-items: center; gap: 8px; transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-glass:hover { background: rgba(255, 255, 255, 0.1); color: #fff; transform: translateY(-1px); border-color: rgba(255, 255, 255, 0.2); }
        .btn-glass:active { transform: translateY(1px); }
        
        .btn-export { background: rgba(33, 150, 243, 0.85); color: #fff; border: 1px solid rgba(33, 150, 243, 1); box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3); }
        .btn-export:hover { background: rgba(33, 150, 243, 1); border-color: rgba(64, 196, 255, 1); box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4); }

        input[type="file"] { display: none; }

        #viewport { position: absolute; top: 65px; bottom: 0; left: 0; right: 0; overflow: hidden; background-color: transparent; cursor: default; }
        #canvas-container { position: relative; transform-origin: 0 0; }
        
        #bg-svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #frames-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #cables-svg   { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #nodes-layer  { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }

        .node {
            position: absolute; background-color: #333333; border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #111; 
            width: fit-content; min-width: 140px; 
            user-select: none; -webkit-user-select: none; transition: box-shadow 0.1s;
            pointer-events: auto; 
        }
        
        .node.selected { border-color: #2196F3; box-shadow: 0 0 0 2px #2196F3, 0 4px 15px rgba(33, 150, 243, 0.4) !important; }

        .node-header { background-color: #444444; padding: 6px 10px; font-weight: bold; font-size: 12px; border-radius: 5px 5px 0 0; text-align: center; cursor: grab; text-shadow: none; color: #eee; }
        .node-header:active { cursor: grabbing; }
        .node-body { padding: 6px 0; display: flex; flex-direction: column; gap: 4px; }
        .socket-row { display: flex; justify-content: space-between; position: relative; font-size: 11px; }
        
        .socket-input, .socket-output { display: flex; align-items: center; min-height: 18px; flex: 1; padding-bottom: 2px; }
        .socket-input { justify-content: flex-start; }
        .socket-output { justify-content: flex-end; }
        .socket-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #aaa; border: 1px solid #222; position: absolute; cursor: crosshair; top: 4px; }
        .socket-diamond { border-radius: 2px !important; transform: rotate(45deg); }
        .socket-input .socket-dot { left: -5px; }
        .socket-output .socket-dot { right: -5px; }
        .socket-label { padding: 0 8px; color: #ccc; white-space: nowrap; }

        .node-frame { background-color: rgba(0,0,0,0.2); border: 2px dashed #666; box-shadow: none; border-radius: 6px;}
        .node-frame .node-header { background: transparent !important; text-align: center; font-size: 18px; color: #888; cursor: grab; pointer-events: auto; border:none; padding-top:10px;}
        .node-frame .node-header:active { cursor: grabbing; }
        .node-frame .node-body { display: none; }

        .node-panel-header {
            background-color: rgba(0,0,0,0.2); color: #ccc; padding: 4px 10px; font-size: 11px;
            cursor: pointer; border-top: 1px solid #222; border-bottom: 1px solid #222;
            display: flex; align-items: center; user-select: none;
        }
        .node-panel-header:hover { background-color: rgba(0,0,0,0.4); color: #fff; }
        .node-panel-header .arrow { font-size: 8px; margin-right: 6px; transition: transform 0.1s; }
        .node-panel-header.closed .arrow { transform: rotate(-90deg); }
        .node-panel-content { display: block; padding-top: 4px; }

        .delete-socket-btn { display: none; cursor: pointer; color: #ff5555; margin: 0 6px; transition: transform 0.1s; font-size: 11px; font-weight: bold;}
        .delete-socket-btn:hover { transform: scale(1.3); }
        .socket-row:hover .delete-socket-btn { display: inline-block; }

        .node-dropdown { background-color: #3a3a3a; color: #ddd; font-size: 11px; padding: 4px 8px; border-radius: 4px; margin: 2px 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; box-shadow: inset 0 1px 2px rgba(0,0,0,0.2); }
        .node-dropdown::after { content: '▼'; font-size: 8px; color: #999; margin-left: 5px;}
        .socket-slider { background-color: #444; color: #ddd; font-size: 11px; padding: 2px 6px; border-radius: 4px; min-width: 70px; text-align: center; border: 1px solid #222; margin-left: 6px; display: flex; justify-content: space-between; align-items: center; }
        .socket-slider.blue { background-color: #416086; }
        .socket-checkbox { width: 10px; height: 10px; background-color: #444; border: 1px solid #222; border-radius: 2px; margin-right: 5px; display: flex; align-items: center; justify-content: center; font-size: 9px;}

        #bg-panel { 
            position: fixed; top: 75px; right: -320px; width: 280px; max-height: 80vh; overflow-y: auto; z-index: 1000; transition: right 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; gap: 12px; padding: 24px; border-radius: 16px 0 0 16px;
            background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-right: none; box-shadow: -10px 10px 40px rgba(0,0,0,0.5); 
        }
        #bg-panel::-webkit-scrollbar { width: 6px; }
        #bg-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        #bg-panel.open { right: 0; }
        .bg-setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #b0b0b0; font-weight: 500;}
        .bg-setting-row input[type="color"] { border: none; padding: 0; width: 32px; height: 26px; cursor: pointer; border-radius:6px; background: transparent;}
        .bg-setting-row select, .bg-setting-row input[type="range"], .bg-setting-row input[type="number"] { width: 125px; background: rgba(0,0,0,0.4); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 4px 6px; font-family: inherit;}
        
        #selection-box { position: fixed; border: 1px dashed rgba(255,255,255,0.8); background-color: rgba(33, 150, 243, 0.1); z-index: 9999; display: none; pointer-events: none; border-radius:4px;}
        
        #context-menu { 
            display: none; position: fixed; z-index: 10000; border-radius: 10px; padding: 8px; min-width: 190px;
            background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
        }
        .ctx-btn { 
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; font-size: 13px; font-weight: 500; cursor: pointer; color: #ccc; 
            border-radius: 6px; user-select: none; transition: all 0.15s ease; 
        }
        .ctx-btn svg { width: 15px; height: 15px; opacity: 0.8; }
        .ctx-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .ctx-btn:hover svg { opacity: 1; }
        .ctx-btn.danger { color: #ff6b6b; margin-top: 4px; border-top: 1px solid rgba(255,255,255,0.05); border-radius: 0 0 6px 6px;}
        .ctx-btn.danger:hover { background: rgba(244, 67, 54, 0.15); color: #ff8a80; }
        .ctx-btn.danger svg { stroke: #ff6b6b; }
    </style>
</head>
<body>

    <div id="ui-bar">
        <label for="jsonFileInput" class="btn-glass">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Open JSON
        </label>
        <input type="file" id="jsonFileInput" accept=".json">

        <button onclick="centrarVista()" class="btn-glass">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19 12h3M2 12h3M12 2v3M12 19v3"></path></svg>
            Center View
        </button>

        <button onclick="toggleBgPanel()" class="btn-glass">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"></path></svg>
            Settings
        </button>

        <div style="margin-left: auto; display: flex; gap: 12px;">
            <button onclick="exportarImagen(true)" class="btn-glass" id="btnExportarTransp" style="border-color: rgba(0, 214, 163, 0.4); color: #00D6A3;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                Transparent PNG
            </button>

            <button onclick="exportarImagen(false)" class="btn-glass btn-export" id="btnExportarMain">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                <span id="export-text">Export HD PNG</span>
            </button>
        </div>
    </div>

    <div id="bg-panel">
        <h4 style="margin:0 0 10px 0; color:#fff; font-weight: 600;">Canvas Background</h4>
        <div class="bg-setting-row"><label>Bg Type</label><select id="bg-type" onchange="updateBackground()"><option value="solid">Solid Color</option><option value="gradient">Gradient</option></select></div>
        <div class="bg-setting-row"><label>Base Color</label><input type="color" id="bg-col1" value="#121212" oninput="updateBackground()"></div>
        <div class="bg-setting-row" id="row-bg-col2" style="display:none;"><label>Sec Color</label><input type="color" id="bg-col2" value="#2a2a2a" oninput="updateBackground()"></div>
        <div class="bg-setting-row" id="row-bg-angle" style="display:none;"><label>Angle</label><input type="number" id="bg-angle" value="135" min="0" max="360" oninput="updateBackground()"></div>
        <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.05); margin: 5px 0;">
        <div class="bg-setting-row"><label>Dot Color</label><input type="color" id="dot-col" value="#333333" oninput="updateBackground()"></div>
        <div class="bg-setting-row"><label>Dot Size</label><input type="range" id="dot-size" min="0" max="4" step="0.5" value="1.5" oninput="updateBackground()"></div>
        <div class="bg-setting-row"><label>Density</label><input type="range" id="dot-space" min="10" max="80" step="2" value="20" oninput="updateBackground()"></div>
        
        <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.05); margin: 5px 0;">
        <h4 style="margin:0 0 5px 0; color:#fff; font-weight: 600;">Stroke Styles</h4>
        <div class="bg-setting-row"><label>Node Thickness</label><input type="range" id="node-bw" min="0" max="5" step="1" value="1" oninput="updateStyles()"></div>
        <div class="bg-setting-row"><label>Node Border</label><select id="node-bs" onchange="updateStyles()"><option value="solid">Solid</option><option value="dashed">Dashed</option><option value="dotted">Dotted</option></select></div>
        <div class="bg-setting-row"><label>Frame Thickness</label><input type="range" id="frame-bw" min="0" max="10" step="1" value="2" oninput="updateStyles()"></div>
        <div class="bg-setting-row"><label>Frame Border</label><select id="frame-bs" onchange="updateStyles()"><option value="dashed">Dashed</option><option value="solid">Solid</option><option value="dotted">Dotted</option></select></div>
        <div class="bg-setting-row"><label>Cable Thickness</label><input type="range" id="cable-w" min="1" max="10" step="1" value="3" oninput="updateStyles()"></div>
    </div>

    <div id="viewport">
        <div id="canvas-container">
            <svg id="bg-svg-layer"></svg>
            <div id="frames-layer"></div>
            <svg id="cables-svg"></svg>
            <div id="nodes-layer"></div>
        </div>
        <div id="selection-box"></div>
    </div>

    <div id="context-menu">
        <div class="ctx-btn" id="ctx-desconectar" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7h2a5 5 0 0 1 0 10h-2m-6 0H7A5 5 0 0 1 7 7h2"></path><line x1="8" y1="12" x2="16" y2="12" stroke-dasharray="2 2"></line></svg>
            Disconnect Cable
        </div>
        <div class="ctx-btn" id="ctx-restaurar" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            Restore Sockets
        </div>
        <div class="ctx-btn" id="ctx-crear-marco">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            Create New Frame
        </div>
        <div class="ctx-btn" id="ctx-asignar-marco" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add to Frame
        </div>
        <div class="ctx-btn" id="ctx-quitar-marco" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Remove from Frame
        </div>
        <div class="ctx-btn" id="ctx-renombrar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Rename
        </div>
        <div class="ctx-btn danger" id="ctx-eliminar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            Delete Node
        </div>
    </div>

    <script>
        const COLOR_MAP = { "GEOMETRY": "#00D6A3", "VALUE": "#A1A1A1", "INT": "#228B22", "VECTOR": "#6363C7", "BOOLEAN": "#D6A3FF", "MATERIAL": "#FF8C9A", "RGBA": "#C7C729", "SHADER": "#63C763", "CUSTOM": "#FFFFFF" };
        const KNOWN_PANELS = {
            'ShaderNodeBsdfPrincipled': {
                'Diffuse': ['Diffuse Roughness'],
                'Subsurface': ['Subsurface Weight', 'Subsurface Radius', 'Subsurface Scale', 'Subsurface IOR', 'Subsurface Anisotropy', 'Subsurface Translucency'],
                'Specular': ['Specular IOR Level', 'Specular Tint', 'Anisotropic', 'Anisotropic Rotation', 'Tangent'],
                'Transmission': ['Transmission Weight'],
                'Coat': ['Coat Weight', 'Coat Roughness', 'Coat IOR', 'Coat Tint', 'Coat Normal'],
                'Sheen': ['Sheen Weight', 'Sheen Roughness', 'Sheen Tint'],
                'Emission': ['Emission Color', 'Emission Strength'],
                'Thin Film': ['Thin Film Thickness', 'Thin Film IOR']
            }
        };

        let socketsPositions = {};
        let canvasBounds = { minX: 0, minY: 0, maxX: 0, maxY: 0 };
        let currentDataGlobal = null;

        let panX = 0, panY = 0, zoomScale = 1;
        const MIN_ZOOM = 0.05, MAX_ZOOM = 5;
        
        const GRID_SCALE = 1.35; 

        const viewportEl = document.getElementById('viewport');
        const canvasEl = document.getElementById('canvas-container');

        window.onload = function() {
            if (typeof INJECTED_DATA !== 'undefined' && INJECTED_DATA) {
                currentDataGlobal = INJECTED_DATA;
                setTimeout(() => renderEngine(currentDataGlobal, true), 100);
            }
        };

        window.toggleMinimize = function(id, event) {
            event.stopPropagation();
            guardarPosiciones();
            let nodo = currentDataGlobal.nodos.find(n => n.id_interno === id);
            if (nodo) {
                nodo.minimizado = !nodo.minimizado;
                renderEngine(currentDataGlobal, false);
            }
        };

        function aplicarTransform() { canvasEl.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`; }

        document.getElementById('jsonFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) { 
                currentDataGlobal = JSON.parse(ev.target.result); 
                renderEngine(currentDataGlobal, true); 
                e.target.value = ''; 
            };
            reader.readAsText(file);
        });

        function getTodosLosHijos(data, parentId) {
            let hijos = [];
            data.nodos.filter(n => n.padre === parentId).forEach(h => {
                hijos.push(h);
                hijos = hijos.concat(getTodosLosHijos(data, h.id_interno));
            });
            return hijos;
        }

        function guardarPosiciones() {
            if (!currentDataGlobal) return;
            document.querySelectorAll('.node').forEach(el => {
                let nId = el.id.replace('node_', '');
                let nodo = currentDataGlobal.nodos.find(n => n.id_interno === nId);
                if (nodo) {
                    nodo.posicion.x = (parseFloat(el.style.left) + canvasBounds.minX) / GRID_SCALE;
                    nodo.posicion.y = -(parseFloat(el.style.top) + canvasBounds.minY) / GRID_SCALE;
                }
            });
        }

        function renderEngine(data, initialLoad = false) {
            const nodesLayer = document.getElementById('nodes-layer');
            const framesLayer = document.getElementById('frames-layer');
            const svgLayer = document.getElementById('cables-svg');
            
            nodesLayer.innerHTML = ''; framesLayer.innerHTML = ''; svgLayer.innerHTML = ''; socketsPositions = {};

            if (initialLoad) {
                panX = 0; panY = 0; zoomScale = 1;
                aplicarTransform();
            }

            const marcos = data.nodos.filter(n => n.es_marco);
            data.nodos.forEach(n => {
                if (!n.es_marco && !n.padre) {
                    marcos.forEach(m => {
                        const mLeft = m.posicion.x - 50, mRight = m.posicion.x + (m.dimensiones.ancho || 200) + 50;
                        const mTop = m.posicion.y + 50, mBottom = m.posicion.y - (m.dimensiones.alto || 200) - 50;
                        if (n.posicion.x >= mLeft && n.posicion.x <= mRight && n.posicion.y <= mTop && n.posicion.y >= mBottom) {
                            n.padre = m.id_interno;
                        }
                    });
                }
            });

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            data.nodos.forEach(n => {
                let px = n.posicion.x * GRID_SCALE;
                let py = -n.posicion.y * GRID_SCALE;
                let w = (n.dimensiones.ancho || 140) * GRID_SCALE;
                let h = (n.dimensiones.alto || 100) * GRID_SCALE;
                
                if(px < minX) minX = px;
                if(px + w > maxX) maxX = px + w;
                if(py < minY) minY = py;
                if(py + h > maxY) maxY = py + h;
            });

            minX -= 150; minY -= 150; maxX += 150; maxY += 150;
            canvasBounds = { minX, minY, maxX, maxY };

            canvasEl.style.width = (maxX - minX) + 'px'; canvasEl.style.height = (maxY - minY) + 'px';
            svgLayer.setAttribute('width', canvasEl.style.width); svgLayer.setAttribute('height', canvasEl.style.height);
            document.getElementById('bg-svg-layer').setAttribute('width', canvasEl.style.width);
            document.getElementById('bg-svg-layer').setAttribute('height', canvasEl.style.height);

            data.nodos.forEach(nodo => {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = nodo.es_marco ? 'node node-frame' : 'node';
                nodeDiv.id = 'node_' + nodo.id_interno;
                
                let px = nodo.posicion.x * GRID_SCALE;
                let py = -nodo.posicion.y * GRID_SCALE;
                nodeDiv.style.left = (px - canvasBounds.minX) + 'px';
                nodeDiv.style.top = (py - canvasBounds.minY) + 'px';

                let zIndex = 20; 
                if (nodo.es_marco) {
                    zIndex = 1;
                    let p = nodo.padre;
                    while(p) { zIndex++; p = data.nodos.find(n => n.id_interno === p)?.padre; }
                }
                nodeDiv.style.zIndex = zIndex;
                nodeDiv.setAttribute('data-z', zIndex);

                const nType = nodo.tipo || '';
                const nTypeStr = nType.toLowerCase();

                        if ((nType.includes('MapRange') || displayName.includes('Map Range')) && !nType.includes('Group')) dropdownHtml += `<div style="padding: 2px 10px; font-size: 11px; display:flex; align-items:center; gap:5px; color:#ddd;"><div class="socket-checkbox" style="background:#2196F3; border-color:rgba(255,255,255,0.1); color:#fff;">✔</div> Clamp</div>`;
                        
                        if (nodo.color_ramp_data && nodo.color_ramp_data.length > 0) {

                            dropdownHtml += `<div style="height: 24px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); margin: 8px 10px; background: linear-gradient(to right, ${stops}); width:100%;"></div>`;

                        if (nodo.rgb_color) {
                            let c = nodo.rgb_color;
                            let rL = Math.pow(c[0], 1/2.2); let gL = Math.pow(c[1], 1/2.2); let bL = Math.pow(c[2], 1/2.2);
                            let r = Math.round(rL*255); let g = Math.round(gL*255); let b = Math.round(bL*255);
                            let rgbaStr = `rgba(${r}, ${g}, ${b}, ${c[3]})`;
                            
                            let maxVal = Math.max(rL, gL, bL);
                            let vPer = (1 - maxVal) * 100; 

                            dropdownHtml += `
                            <div style="display:flex; flex-direction:column; align-items:center; background:rgba(0,0,0,0.2); border-radius:8px; padding:10px; margin: 5px 10px; border:1px solid rgba(255,255,255,0.05); width: calc(100% - 20px); box-sizing: border-box;">

                                <div style="height: 20px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); margin-top: 12px; background-color: ${rgbaStr}; width:100%; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);"></div>
                            </div>`;

                        if(dropdownHtml !== '') html += `<div style="padding-top: 5px; display: flex; flex-wrap: wrap;">${dropdownHtml}</div>`;

                        let finalBodyHtml = `<div class="node-body">`;
                        let currentPanelName = null;
                        
                        let inVisibles = nodo.puertos_entrada.filter(p => !p.oculto);
                        let outVisibles = nodo.puertos_salida.filter(p => !p.oculto);

                        for (let i = 0; i < maxRows; i++) {
                            const input = inVisibles[i];
                            const output = outVisibles[i];
                            
                            let pName = null;
                            if (input && KNOWN_PANELS[nType]) {
                                for (const [key, items] of Object.entries(KNOWN_PANELS[nType])) {
                                    if (items.includes(input.nombre)) { pName = key; break; }
                                }
                            }

                            if (pName !== currentPanelName) {
                                if (currentPanelName !== null) finalBodyHtml += `</div>`; 
                                if (pName !== null) {
                                    finalBodyHtml += `<div class="node-panel-header closed" onclick="this.classList.toggle('closed'); const c = this.nextElementSibling; c.style.display = c.style.display === 'none' ? 'block' : 'none'; guardarPosiciones(); recalcularCablesYDibujar(); ajustarFrames(); adaptarLienzo();"><span class="arrow">▼</span> ${pName}</div>`;
                                    finalBodyHtml += `<div class="node-panel-content" style="display: none;">`;
                                }
                                currentPanelName = pName;
                            }

                            let rowHtml = `<div class="socket-row">`;

                            if (input) {
                                const color = COLOR_MAP[input.tipo_dato] || "#aaa";
                                const isFieldIn = input.tipo_dato === 'BOOLEAN' || (input.nombre || '') === 'Selection';
                                const diamondClassIn = isFieldIn ? 'socket-diamond' : '';
                                const btnIn = `<div class="delete-socket-btn" onclick="borrarPuerto('${nodo.id_interno}', '${input.nombre}', 'in')" title="Hide">✖</div>`;
                                let labelHtml = `<span class="socket-label">${input.nombre}</span>`;
                                
                                if (!input.conectado && input.valor !== undefined && input.valor !== null) {
                                    if (typeof input.valor === 'boolean') {
                                        const checkStyle = input.valor ? 'background:#2196F3; border-color:rgba(255,255,255,0.1);' : '';
                                        labelHtml = `<div style="display:flex; align-items:center; color:#ccc; margin-left:8px; font-size:11px;"><div class="socket-checkbox" style="${checkStyle}">${input.valor ? '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}</div> ${input.nombre}</div>`;
                                    } else if (Array.isArray(input.valor) && input.tipo_dato === 'RGBA') {
                                        let c = input.valor;
                                        let rgbaStr = `rgba(${Math.round(Math.pow(c[0],1/2.2)*255)}, ${Math.round(Math.pow(c[1],1/2.2)*255)}, ${Math.round(Math.pow(c[2],1/2.2)*255)}, ${c[3]})`;
                                        labelHtml = `<div style="display:flex; align-items:center; margin-left:6px;"><div style="width:35px; height:14px; border-radius:3px; background-color:${rgbaStr}; border:1px solid rgba(255,255,255,0.1); margin-right:8px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);"></div><span style="color:#d0d0d0;">${input.nombre}</span></div>`;
                                    } else if (Array.isArray(input.valor)) {
                                        let vecHtml = `<div style="display:flex; flex-direction:column; gap:3px; margin-left:8px;">`;
                                        input.valor.slice(0, 3).forEach(v => { vecHtml += `<div class="socket-slider" style="min-width:60px; justify-content:center;"><span>${v}</span></div>`; });
                                        vecHtml += `</div>`;
                                        labelHtml = `<div style="display:flex; align-items:center;"><span style="color:#d0d0d0; font-size:11px; margin-left:8px;">${input.nombre}</span>${vecHtml}</div>`;
                                    } else {
                                        let isSliderAzul = ['Weight', 'Factor', 'Fac', 'Probability', 'Mix', 'Scale'].includes(input.nombre); 
                                        labelHtml = `<div class="socket-slider ${isSliderAzul ? 'blue' : ''}"><span style="color:#ccc; margin-right:15px;">${input.nombre}</span><span>${input.valor}</span></div>`;
                                    }
                                }
                                rowHtml += `<div class="socket-input" style="align-items: flex-start; padding-top:2px;"><div class="socket-dot ${diamondClassIn}" id="socket_in_${nodo.id_interno}_${input.nombre}" data-node="${nodo.id_interno}" data-port="${input.nombre}" data-type="in" style="background-color: ${color}; top:6px;" data-dashed="${isFieldIn}"></div>${labelHtml}${btnIn}</div>`;
                            } else rowHtml += `<div class="socket-input"></div>`;

                            if (output) {
                                const color = COLOR_MAP[output.tipo_dato] || "#aaa";
                                const isFieldOut = output.tipo_dato === 'BOOLEAN' || ((output.nombre || '') === 'Result' && nType.includes('Compare'));
                                const diamondClassOut = isFieldOut ? 'socket-diamond' : ''; 
                                const btnOut = `<div class="delete-socket-btn" onclick="borrarPuerto('${nodo.id_interno}', '${output.nombre}', 'out')" title="Hide">✖</div>`;

                                rowHtml += `<div class="socket-output" style="align-items: flex-start; padding-top:2px;">${btnOut}<span class="socket-label">${output.nombre}</span><div class="socket-dot ${diamondClassOut}" id="socket_out_${nodo.id_interno}_${output.nombre}" data-node="${nodo.id_interno}" data-port="${output.nombre}" data-type="out" style="background-color: ${color}; top:6px;" data-dashed="${isFieldOut}"></div></div>`;
                            } else rowHtml += `<div class="socket-output"></div>`;

                            rowHtml += `</div>`;
                            finalBodyHtml += rowHtml;
                        }

                        if (currentPanelName !== null) finalBodyHtml += `</div>`; 
                        finalBodyHtml += `</div>`; 
                        html += finalBodyHtml;
                    }
                }

                if (!nodo.es_marco && !isMinimized) {
                    html += `<div style="position:absolute; right: -4px; top: 0; bottom: 0; width: 8px; cursor: ew-resize; z-index: 10;" onmousedown="
                        event.stopPropagation();
                        let startX = event.clientX;
                        let startWidth = this.parentElement.offsetWidth;
                        window.onmousemove = (ev) => {
                            this.parentElement.style.width = 'fit-content';
                            this.parentElement.style.minWidth = (startWidth + (ev.clientX - startX)/zoomScale) + 'px';
                            recalcularCablesYDibujar();
                            ajustarFrames();
                            adaptarLienzo();
                        };
                        window.onmouseup = () => { window.onmousemove = null; guardarPosiciones(); }
                    "></div>`;
                }

                nodeDiv.innerHTML = html;
                
                if (nodo.es_marco) framesLayer.appendChild(nodeDiv);
                else nodesLayer.appendChild(nodeDiv);

                if (nodo.rgb_color && !isMinimized) {
                    let canvas = document.getElementById(`wheel_${nodo.id_interno}`);
                    let marker = document.getElementById(`marker_${nodo.id_interno}`);
                    if (canvas && marker) {
                        let ctx = canvas.getContext('2d');
                        for(let a=0; a<360; a++) {
                            ctx.beginPath(); ctx.moveTo(50, 50); ctx.arc(50, 50, 50, (a-1)*Math.PI/180, (a+1)*Math.PI/180);
                            ctx.fillStyle = `hsl(${a}, 100%, 50%)`; ctx.fill();
                        }
                        let grd = ctx.createRadialGradient(50, 50, 0, 50, 50, 50);
                        grd.addColorStop(0, 'white'); grd.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.fillStyle = grd; ctx.fillRect(0,0,100,100);

                        let c = nodo.rgb_color; 
                        let rL = Math.pow(c[0], 1/2.2); let gL = Math.pow(c[1], 1/2.2); let bL = Math.pow(c[2], 1/2.2);
                        let max = Math.max(rL, gL, bL), min = Math.min(rL, gL, bL);
                        let h = 0, s = (max === 0 ? 0 : (max - min) / max);
                        if (max !== min) {
                            if (max === rL) h = (gL - bL) / (max - min) + (gL < bL ? 6 : 0);
                            else if (max === gL) h = (bL - rL) / (max - min) + 2;
                            else h = (rL - gL) / (max - min) + 4;
                            h /= 6;
                        }
                        let angleRad = h * 2 * Math.PI;
                        marker.style.left = (50 + Math.cos(angleRad) * s * 50 - 6) + 'px';
                        marker.style.top = (50 - Math.sin(angleRad) * s * 50 - 6) + 'px';
                    }
                }

                if (nodo.es_marco) hacerMarcoArrastrable(nodeDiv, nodo);

            setTimeout(() => {
                const containerRect = canvasEl.getBoundingClientRect();
                document.querySelectorAll('.socket-dot').forEach(dot => {
                    const rect = dot.getBoundingClientRect();
                    socketsPositions[dot.id] = {
                        x: (rect.left - containerRect.left) / zoomScale + (rect.width / 2),
                        y: (rect.top - containerRect.top) / zoomScale + (rect.height / 2),
                        color: dot.style.backgroundColor,
                        isDashed: dot.getAttribute('data-dashed') === 'true' 
                    };
                });
                drawCables(data.cables);
                ajustarFrames(); 
                
                if (initialLoad) {
                    adaptarLienzo(); 
                    centrarVista(); 
                } else {
                    adaptarLienzo();
                }
                
                updateBackground();
                if (typeof updateStyles === 'function') updateStyles(); 
            }, 100);
        }

        function adaptarLienzo() {
            const nodes = document.querySelectorAll('.node');
            if (nodes.length === 0) return;

            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            nodes.forEach(n => {
                let l = parseFloat(n.style.left) || 0;
                let t = parseFloat(n.style.top) || 0;
                let r = l + n.offsetWidth;
                let b = t + n.offsetHeight;
                if (l < minX) minX = l;
                if (t < minY) minY = t;
                if (r > maxX) maxX = r;
                if (b > maxY) maxY = b;
            });
            
            const MARGEN = 150; 
            let shiftX = MARGEN - minX;
            let shiftY = MARGEN - minY;

            if (Math.abs(shiftX) > 1 || Math.abs(shiftY) > 1) {
                nodes.forEach(n => {
                    n.style.left = ((parseFloat(n.style.left) || 0) + shiftX) + 'px';
                    n.style.top = ((parseFloat(n.style.top) || 0) + shiftY) + 'px';
                });
                maxX += shiftX;
                maxY += shiftY;
                
                canvasBounds.minX -= shiftX;
                canvasBounds.minY -= shiftY;
                
                panX -= shiftX * zoomScale;
                panY -= shiftY * zoomScale;
                aplicarTransform();
                
                recalcularCablesYDibujar();
            }

            canvasEl.style.width = (maxX + MARGEN) + 'px';
            canvasEl.style.height = (maxY + MARGEN) + 'px';
            document.getElementById('cables-svg').setAttribute('width', canvasEl.style.width);
            document.getElementById('cables-svg').setAttribute('height', canvasEl.style.height);
            document.getElementById('bg-svg-layer').setAttribute('width', canvasEl.style.width);
            document.getElementById('bg-svg-layer').setAttribute('height', canvasEl.style.height);
        }

        function drawCables(cables) {
            const svg = document.getElementById('cables-svg');
            let cWidth = document.getElementById('cable-w') ? document.getElementById('cable-w').value : 3;
            let svgHtml = '';
            cables.forEach(cable => {
                const posFrom = socketsPositions[`socket_out_${cable.desde_nodo}_${cable.desde_puerto}`];
                const posTo = socketsPositions[`socket_in_${cable.hacia_nodo}_${cable.hacia_puerto}`];

                if (posFrom && posTo) {
                    const x1 = posFrom.x, y1 = posFrom.y, x2 = posTo.x, y2 = posTo.y;
                    const dx = Math.abs(x2 - x1) * 0.5;
                    const dashArray = (posFrom.isDashed || posTo.isDashed) ? 'stroke-dasharray="8,5"' : '';
                    const pathData = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
                    svgHtml += `<path d="${pathData}" stroke="${posFrom.color}" stroke-width="${cWidth}" fill="none" opacity="0.8" ${dashArray} />`;
                }
            });
            svg.innerHTML = svgHtml;
        }

        function centrarVista() {
            const contentWidth = canvasEl.offsetWidth, contentHeight = canvasEl.offsetHeight;
            if (!contentWidth || !contentHeight) return;
            const PADDING = 0.92; 
            const scaleX = viewportEl.clientWidth / contentWidth, scaleY = viewportEl.clientHeight / contentHeight;
            zoomScale = Math.max(MIN_ZOOM, Math.min(Math.min(scaleX, scaleY) * PADDING, MAX_ZOOM));
            panX = (viewportEl.clientWidth - contentWidth * zoomScale) / 2;
            panY = (viewportEl.clientHeight - contentHeight * zoomScale) / 2;
            aplicarTransform();
        }

        viewportEl.addEventListener('wheel', function(e) {
            e.preventDefault();
            const rect = viewportEl.getBoundingClientRect();
            const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
            const newScale = Math.max(MIN_ZOOM, Math.min(zoomScale * (e.deltaY < 0 ? 1.1 : 0.9), MAX_ZOOM));
            panX = mouseX - ((mouseX - panX) / zoomScale) * newScale;
            panY = mouseY - ((mouseY - panY) / zoomScale) * newScale;
            zoomScale = newScale;
            aplicarTransform();
        }, { passive: false });

        let isPanning = false, panStartX = 0, panStartY = 0, panOrigX = 0, panOrigY = 0;

            if (isPanning) {

                selBox.style.left = Math.min(e.clientX, selStartX) + 'px';

        function recalcularCablesYDibujar() {
            if (!currentDataGlobal) return;
            socketsPositions = {}; 
            const containerRect = canvasEl.getBoundingClientRect();
            document.querySelectorAll('.socket-dot').forEach(dot => {
                const rect = dot.getBoundingClientRect();
                socketsPositions[dot.id] = {
                    x: (rect.left - containerRect.left) / zoomScale + (rect.width / 2),
                    y: (rect.top - containerRect.top) / zoomScale + (rect.height / 2),
                    color: dot.style.backgroundColor,
                    isDashed: dot.getAttribute('data-dashed') === 'true'
                };
            });
            drawCables(currentDataGlobal.cables);
        }

        function ajustarFrames() {
            if (!currentDataGlobal) return;
            let frames = currentDataGlobal.nodos.filter(n => n.es_marco);
            frames.sort((a, b) => {
                let dA = 0, pA = a.padre; while(pA) { dA++; pA = currentDataGlobal.nodos.find(n => n.id_interno === pA)?.padre; }
                let dB = 0, pB = b.padre; while(pB) { dB++; pB = currentDataGlobal.nodos.find(n => n.id_interno === pB)?.padre; }
                return dB - dA;
            });

            frames.forEach(marco => {
                const hijos = getTodosLosHijos(currentDataGlobal, marco.id_interno);
                if (hijos.length > 0) {
                    let minL = Infinity, maxR = -Infinity, minT = Infinity, maxB = -Infinity;
                    hijos.forEach(h => {
                        const hDiv = document.getElementById('node_' + h.id_interno);
                        if (hDiv) {
                            const l = parseFloat(hDiv.style.left), t = parseFloat(hDiv.style.top);
                            const w = hDiv.offsetWidth || 180, alt = hDiv.offsetHeight || 50;
                            minL = Math.min(minL, l); maxR = Math.max(maxR, l + w);
                            minT = Math.min(minT, t); maxB = Math.max(maxB, t + alt);
                        }
                    });
                    const mDiv = document.getElementById('node_' + marco.id_interno);
                    if (mDiv && minL !== Infinity) {
                        mDiv.style.left = (minL - 25) + 'px'; mDiv.style.top = (minT - 45) + 'px';
                        mDiv.style.width = (maxR - minL + 50) + 'px'; mDiv.style.height = (maxB - minT + 70) + 'px';
                    }
                }
            });
        }

        function exportarImagen(transparente = false) {
            const btnOriginal = document.getElementById('btnExportarMain');

            if(transparente && btnTransp) {
                btnTransp.innerHTML = 'Exporting...';
                btnTransp.style.background = "rgba(0, 214, 163, 0.2)";
            } else if(!transparente && btnOriginal) {
                btnOriginal.querySelector('#export-text').innerText = "⏳ Exporting...";
                btnOriginal.style.background = "rgba(100, 181, 246, 0.9)";
            }
            
            document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected')); 
            const canvasContenedor = document.getElementById('canvas-container');
            const transformOriginal = canvasContenedor.style.transform;
            canvasContenedor.style.transform = 'none';

            const bgLayer = document.getElementById('bg-svg-layer');
            const originalBgDisplay = bgLayer.style.display;
            
            if (transparente) {
                bgLayer.style.display = 'none'; 
            }

            html2canvas(canvasContenedor, { backgroundColor: null, scale: 2, logging: false }).then(canvas => {
                canvasContenedor.style.transform = transformOriginal;
                if (transparente) bgLayer.style.display = originalBgDisplay;
                
                const enlaceDescarga = document.createElement('a');
                let d = new Date();
                let timeStr = `${d.getHours()}${d.getMinutes()}${d.getSeconds()}`;
                let baseName = (currentDataGlobal && currentDataGlobal.proyecto) ? currentDataGlobal.proyecto : 'NodeGenerator';
                let sufijo = transparente ? '_Alpha' : '';
                enlaceDescarga.download = `${baseName}${sufijo}_${timeStr}.png`;
                
                enlaceDescarga.href = canvas.toDataURL('image/png');
                enlaceDescarga.click();
                
                if(transparente && btnTransp) {
                    btnTransp.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Transparent PNG';
                    btnTransp.style.background = "rgba(255, 255, 255, 0.05)";
                } else if(!transparente && btnOriginal) {
                    btnOriginal.querySelector('#export-text').innerText = "Export HD PNG";
                    btnOriginal.style.background = "rgba(33, 150, 243, 0.85)";
                }
            }).catch(err => {
                console.error("Error al generar la imagen:", err);
                canvasContenedor.style.transform = transformOriginal;
                if (transparente) bgLayer.style.display = originalBgDisplay;
                
                if(transparente && btnTransp) {
                    btnTransp.innerHTML = 'Error';
                    btnTransp.style.background = "#ff6b6b";
                    setTimeout(() => { 
                        btnTransp.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Transparent PNG';
                        btnTransp.style.background = "rgba(255, 255, 255, 0.05)";
                    }, 3000);
                } else if(!transparente && btnOriginal) {
                    btnOriginal.querySelector('#export-text').innerText = "Error";
                    btnOriginal.style.background = "#ff6b6b";
                    setTimeout(() => { 
                        btnOriginal.querySelector('#export-text').innerText = "Export HD PNG"; 
                        btnOriginal.style.background = "rgba(33, 150, 243, 0.85)"; 
                    }, 3000);
                }
            });
        }
    </script>
</body>
</html>
